# Synkroniserer galleri fra Instagram (Graph API) til data/gallery.json + images/gallery/auto/
# Kjører daglig og kan startes manuelt (Actions → denne workflowen → Run workflow).
#
# Forutsetning: se scripts/INSTAGRAM-OPPSLAG.txt (Meta-app, Creator/Business, secrets).

name: Sync Instagram gallery

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: instagram-gallery-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch media and write gallery
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_LIMIT: ${{ vars.INSTAGRAM_LIMIT }}
        run: node scripts/fetch-instagram.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gallery.json images/gallery/auto
          if git diff --staged --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "chore: sync Instagram gallery"
            git push
          fi
